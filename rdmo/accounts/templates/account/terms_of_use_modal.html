{% load i18n %}

    <div id="terms-of-use-modal" class="modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-scrollable modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                    {% trans 'Terms of use' %}
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    {% get_current_language as lang %}
                    {% if lang == 'en' %}
                    {% include 'account/terms_of_use_en.html' %}
                    {% elif lang == 'de' %}
                    {% include 'account/terms_of_use_de.html' %}
                    {% endif %}
                </div>
                <div class="modal-footer">
                    <button id="terms-of-use-accept" type="button" class="btn btn-primary">
                        {% trans 'I agree to the terms of use' %}
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const modal = new bootstrap.Modal(document.getElementById('terms-of-use-modal'));
            {% if request.method == 'GET' %}modal.show();{% endif %}

            const span = document.getElementById('show-terms-of-use');
            span.classList.add('link');
            span.addEventListener('click', function (event) {
                event.preventDefault();
                modal.show();
            });

            const button = document.getElementById('terms-of-use-accept');
            button.addEventListener('click', function (event) {
                document.getElementById('id_consent').checked = true;
                modal.hide();
            });
        });
    </script>
