# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Run manual autoupdate with:
#   pre-commit autoupdate --freeze
#   pre-commit run --all-files

# do not touch the migration files at all: these are auto-generated by Django
exclude: \/migrations\/

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-ast
      - id: check-json
      - id: check-xml
        exclude: error\.xml$
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: \.html$|\.txt$
      - id: trailing-whitespace
        exclude: \.dot$
      - id: debug-statements
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 3b3f7c3f57fe9925356faf5fe6230835138be230  # frozen: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: 97a8e4af05a8fa8a0ed79d2fbd1f4c86bf1a0178  # frozen: v10.5.0
    hooks:
      - id: eslint
        args: [--fix, --color]
        additional_dependencies:
          - eslint@8.56.0
          - eslint-plugin-react@7.37.0
          - eslint-plugin-simple-import-sort@12.1.1
          - react@18.3.1
  - repo: https://github.com/crate-ci/typos
    rev: 37bb98842b0d8c4ffebdb75301a13db0267cef89  # frozen: v1.47.2
    hooks:
    - id: typos
      exclude: |
        (?x)^(
            rdmo/locale/.*|
            rdmo/.*_de.html$|
            rdmo/.*_es.html$|
            rdmo/.*_fr.html$|
            rdmo/.*_it.html$|
            testing/.*.json|
            testing/.*.xml
        )$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
    hooks:
    - id: zizmor
      args: [--fix, --offline]
ci:
  autofix_prs: false
