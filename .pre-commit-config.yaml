# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Run manual autoupdate with:
#   pre-commit autoupdate --freeze
#   pre-commit run --all-files

# do not touch the migration files at all: these are auto-generated by Django
exclude: \/migrations\/

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-ast
      - id: check-json
      - id: check-xml
        exclude: error\.xml$
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: \.html$|\.txt$
      - id: trailing-whitespace
        exclude: \.dot$
      - id: debug-statements
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 0671d8ab202c4ac093b78433ae5baf74f3fc7246  # frozen: v0.15.15
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: 61e8b06e669ce52c94348373faab214beaa8cd4c  # frozen: v10.4.1
    hooks:
      - id: eslint
        args: [--fix, --color]
        additional_dependencies:
          - eslint@8.56.0
          - eslint-plugin-react@7.37.0
          - react@18.3.1
  - repo: https://github.com/crate-ci/typos
    rev: f8a58b6b53f2279f71eb605f03a4ae4d10608f45  # frozen: v1.47.0
    hooks:
    - id: typos
      exclude: |
        (?x)^(
            rdmo/locale/.*|
            rdmo/.*_de.html$|
            rdmo/.*_es.html$|
            rdmo/.*_fr.html$|
            rdmo/.*_it.html$|
            testing/.*.json|
            testing/.*.xml
        )$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: 9257c6050c0261b8c57e712f632dc4a8010109a9  # frozen: v1.25.2
    hooks:
    - id: zizmor
      args: [--fix, --offline]
ci:
  autofix_prs: false
