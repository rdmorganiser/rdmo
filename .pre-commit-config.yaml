# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
# Run manual autoupdate with:
#   pre-commit autoupdate --freeze
#   pre-commit run --all-files

# do not touch the migration files at all: these are auto-generated by Django
exclude: \/migrations\/

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-ast
      - id: check-json
      - id: check-xml
        exclude: error\.xml$
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: \.html$|\.txt$
      - id: trailing-whitespace
        exclude: \.dot$
      - id: debug-statements
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 77039ccbba72c8aede339c5f8ae29b42aced0a2e  # frozen: v0.15.18
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: 97a8e4af05a8fa8a0ed79d2fbd1f4c86bf1a0178  # frozen: v10.5.0
    hooks:
      - id: eslint
        args: [--fix, --color]
        additional_dependencies:
          - eslint@8.56.0
          - eslint-plugin-react@7.37.0
          - react@18.3.1
  - repo: https://github.com/crate-ci/typos
    rev: d80b8e26878e372a041833cd67163dbdb6a4336e  # frozen: v1
    hooks:
    - id: typos
      exclude: |
        (?x)^(
            rdmo/locale/.*|
            rdmo/.*_de.html$|
            rdmo/.*_es.html$|
            rdmo/.*_fr.html$|
            rdmo/.*_it.html$|
            testing/.*.json|
            testing/.*.xml
        )$
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
    hooks:
    - id: zizmor
      args: [--fix, --offline]
ci:
  autofix_prs: false
